# spring相关配置
server:
  port: 8080
  servlet:
#    context-path: /v1
spring:
  application:
    name: bingoCV
  # 数据库
  datasource:
    url: jdbc:mysql://localhost:3307/bingoCV?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Druid 连接池详细配置
    druid:
      initial-size: 5      # 初始化连接数
      min-idle: 5          # 最小空闲连接数
      max-active: 20       # 最大活跃连接数
      max-wait: 60000      # 获取连接等待超时时间
      time-between-eviction-runs-millis: 60000 # 检查空闲连接的周期
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms
  servlet:
    multipart:
      max-file-size: 10MB     # 单个文件大小
      max-request-size: 50MB  # 总请求大小

  # jdk21开启虚拟线程
  threads:
    virtual:
      enabled: true

# mybatis-plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名自动映射
  global-config:
    db-config:
      logic-delete-field: deleted # 如果有逻辑删除的话
