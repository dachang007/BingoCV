<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

    <title>注册-bingoCV</title>
    <link rel="stylesheet" href="css/register-style.css">
</head>

<body>
    <div class="container">
        <div class="panda">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="face">
                <div class="eye-shadow left"></div>
                <div class="eye-white left">
                    <div class="eye-ball"></div>
                </div>
                <div class="eye-shadow right"></div>
                <div class="eye-white right">
                    <div class="eye-ball"></div>
                </div>
                <div class="nose"></div>
                <div class="mouth"></div>
            </div>
            <div class="body"></div>
            <div class="foot left">
                <div class="sole"></div>
            </div>
            <div class="foot right">
                <div class="sole"></div>
            </div>
        </div>
        <div class="login-box register-box">
            <div class="hand left"></div>
            <div class="hand right"></div>
            <h1>用户注册</h1>
            <div class="ipt-box">
                <input type="text" id="reg-username" required>
                <label>用户名</label>
            </div>
            <div class="ipt-box">
                <div class="password-container">
                    <input type="password" id="reg-password" required>
                    <label>密码</label>
                    <span id="toggleRegPassword" class="eye-style" onclick="toggleRegPassword()">👁️</span>
                </div>
            </div>
            <div class="ipt-box">
                <div class="password-container">
                    <input type="password" id="reg-confirm-password" required>
                    <label>确认密码</label>
                    <span id="toggleRegConfirmPassword" class="eye-style" onclick="toggleRegConfirmPassword()">👁️</span>
                </div>
            </div>
            <div class="ipt-box captcha-box">
                <input type="text" id="reg-captcha" required placeholder="请输入验证码，单机刷新">
                <img class="regCaptchaImg" id="regCaptchaImg" src="/captcha/image" onclick="refreshRegCaptcha()" alt="验证码">
            </div>
            <div class="agree-box">
                <label><input type="checkbox" id="agreeProtocol"> 我已阅读并同意<a href="javascript:void(0)" onclick="showProtocol()">《用户协议》</a>和<a href="javascript:void(0)" onclick="showPrivacy()">《隐私政策》</a></label>
            </div>
            <div id="register-error" class="error-message" style="color:#1dc797"></div>
            <button id="registerBtn" onclick="doRegister()">注册</button>
            <p class="link-text">已有账号？<a href="index.html">立即登录</a></p>
        </div>
    </div>
    <script src="js/jquery-3.6.0.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
